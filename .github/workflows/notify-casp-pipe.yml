name: Notify casp-pipe of Update

on:
  push:
    branches:
      - main

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT_FOR_DISPATCH }}
          repository: seoklab/casp-pipe
          event-type: gmol_base_updated
